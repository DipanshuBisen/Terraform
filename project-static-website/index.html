<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flipkart UI Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">Flipkart</div>
    <input type="text" placeholder="Search for products, brands and more">
    <button>Login</button>
</header>

<!-- Categories -->
<section class="categories">
    <div>Mobiles</div>
    <div>Fashion</div>
    <div>Electronics</div>
    <div>Home</div>
    <div>Appliances</div>
</section>

<!-- Banner -->
<section class="banner">
    <h2>Big Billion Day Sale</h2>
</section>

<!-- Products -->
<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h4>iPhone 15</h4>
        <p>₹79,999</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h4>Shoes</h4>
        <p>₹1,999</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h4>Laptop</h4>
        <p>₹55,000</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h4>Headphones</h4>
        <p>₹2,499</p>
    </div>
</section>

</body>
</html>
